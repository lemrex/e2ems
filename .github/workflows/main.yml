    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3


      - name: Build and push Docker images
        run: |

          docker login -u af-south-1@HST3WCCJA5SHYFCP3OU3 -p 0704e75c354474413babb3d1c3e6741b4813ed69346c9d90fcb1a57629499fa4 swr.af-south-1.myhuaweicloud.com

          docker build -t $REGISTRY/frontend:latest ./frontend
